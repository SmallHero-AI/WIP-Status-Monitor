        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title { grid-column: 1 / -1; font-size: 12px; color: #1e40af; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; margin-top: 5px; font-weight: bold; }
        .info-panel { background: #fdfae8; border: 1px solid #fde047; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .info-table { width: 100%; border-collapse: collapse; background: white; font-size: 11px; }

<script>
const dataStore = {}; const charts = {};
const p=(v)=>v?parseFloat(String(v).replace(/[↑↓,%\s]/g,''))||0:0;
const v=(id)=> { const el=document.getElementById(id); return el?el.value:''; };

function switchTab(event, targetId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const targetPage = document.getElementById(targetId);
    if(targetPage) targetPage.classList.add('active');
    if(event && event.currentTarget) event.currentTarget.classList.add('active');
    else if(event && event.target) event.target.classList.add('active');
}

const parseData = (rows) => {
    return rows.filter(r => r[0] && (String(r[0]).includes('/') || /^\d{8}$/.test(r[0]))).map(r => ({
        date: String(r[0]).trim(), open: p(r[1]), high: p(r[2]), low: p(r[3]), close: p(r[4]),
        ma20: p(r[7]), ma60: p(r[8]), eom: p(r[10]), eomSig: p(r[11]), mfi: p(r[12]), macd: p(r[14])
    }));
};

function updateUI(code, trd, tot, mCap, ds, bi, si) {
    const sls = trd.filter(t => t.type === '賣出'), pnls = sls.map(t => t.pnl), cnt = sls.length;
    const win = pnls.filter(v => v > 0).length, mxP = cnt ? Math.max(...pnls) : 0, mxL = cnt ? Math.min(...pnls) : 0, avg = cnt ? tot / cnt : 0;
    const shInput = document.getElementById('s'+code+'_sh');
    const shVal = shInput ? parseInt(shInput.value)*1000 : 1000;
    const avgEnt = cnt ? (sls.reduce((s, t) => s + t.entP, 0) / cnt) * shVal : 1;

    const dash = document.getElementById('s'+code+'_dash');
    if(dash) dash.innerHTML = `
        <div class="stat-card"><b>累積淨損益</b><span class="${tot>=0?'win':'loss'}">$${Math.round(tot).toLocaleString()}</span></div>
        <div class="stat-card"><b>所需本金</b><span>$${Math.round(mCap).toLocaleString()}</span></div>
        <div class="stat-card"><b>ROI</b><span>${mCap>0?(tot/mCap*100).toFixed(2):0}%</span></div>
        <div class="stat-card"><b>勝率</b><span>${cnt}次/${cnt>0?(win/cnt*100).toFixed(1):0}%</span></div>
        <div class="stat-card"><b>最大獲利</b><span class="win">$${Math.round(mxP).toLocaleString()}</span></div>
        <div class="stat-card"><b>最大虧損</b><span class="loss">$${Math.round(mxL).toLocaleString()}</span></div>
        <div class="stat-card"><b>平均損益</b><span>$${Math.round(avg).toLocaleString()}</span></div>
        <div class="stat-card"><b>期望報酬</b><span>${(avg/avgEnt*100).toFixed(2)}%</span></div>`;

    const tbody = document.querySelector('#s'+code+'_table tbody');
    if(tbody) tbody.innerHTML = trd.map(t => `
        <tr class="${t.type==='買入'?'buy-row':'sell-row'}">
            <td><b>${t.type}</b></td><td>${t.date}</td><td>${t.price.toFixed(1)}</td><td>${t.info}</td>
            <td class="${t.pnl>0?'win':(t.pnl<0?'loss':'')}">${t.pnl?Math.round(t.pnl).toLocaleString():'-'}</td>
        </tr>`).reverse().join('');

    const ctx = document.getElementById('s'+code+'_chart');
    if(ctx) {
        if(charts[code]) charts[code].destroy();
        charts[code] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ds.map(d => d.date),
                datasets: [
                    { label: '收盤價', data: ds.map(d => d.close), borderColor: '#475569', borderWidth: 1, pointRadius: 0 },
                    { label: '買點', data: bi.map((v,i)=>v?ds[i].close:null), backgroundColor: 'red', pointRadius: 4, showLine: false },
                    { label: '賣點', data: si.map((v,i)=>v?ds[i].close:null), backgroundColor: 'green', pointRadius: 4, showLine: false }
                ]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
}
