<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今天吃什麼？ | 隨機決策工具</title>
    <meta name="description" content="不知道今天午餐或晚餐要吃什麼嗎？使用這款『今天吃什麼？』隨機決策工具，輕鬆幫你決定下一餐！" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>
      
      <main class="container">
        <header>
          <h1 class="glow-text">今天吃什麼？</h1>
          <p class="subtitle">讓命運幫你決定下一餐</p>
        </header>

        <section class="display-section">
          <div class="result-card glass" id="result-card">
            <span class="emoji-display" id="result-emoji">😋</span>
            <h2 id="result-text">點擊按鈕開始</h2>
          </div>
        </section>

        <section class="action-section">
          <button id="decide-btn" class="primary-btn">幫我決定！</button>
        </section>

        <section class="list-section glass">
          <div class="list-header">
            <h3>菜單列表</h3>
            <button id="add-toggle" class="icon-btn">+</button>
          </div>
          
          <div id="add-form" class="add-form hidden">
            <input type="text" id="food-input" placeholder="新增美食名稱..." maxlength="15" />
            <button id="add-btn">新增</button>
          </div>

          <div class="food-tags" id="food-list">
            <!-- Food tags will be injected here -->
          </div>
        </section>
      </main>

      <div id="toast" class="toast hidden"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
